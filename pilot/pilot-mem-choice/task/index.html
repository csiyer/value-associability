<!DOCTYPE html>
<html>

<head>
    <title>Card Game Experiment</title>
    <!-- jsPsych 8.x -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.5.0"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #f0f0f0;
            --text-color: #333;
            --card-radius: 12px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .jspsych-content-wrapper {
            max-width: 1250px;
        }

        .instruction-container {
            max-width: 800px;
            text-align: left;
            margin: 0 auto;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #1a1a1a;
            margin-top: 0;
        }

        .jspsych-btn {
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <script src="params.js"></script>
    <script src="task.js"></script>

    <script>
        // Initialize jsPsych
        const jsPsych = initJsPsych({
            on_finish: function () {
                // Handle final redirection or data summary
            }
        });

        // Theme
        document.body.style.backgroundColor = params.background_color;

        // Subject ID
        const subject_id = jsPsych.randomization.randomID(10);
        jsPsych.data.addProperties({
            subject_id: subject_id,
            prolific_id: jsPsych.data.getURLVariable('PROLIFIC_PID'),
            study_id: jsPsych.data.getURLVariable('STUDY_ID'),
            session_id: jsPsych.data.getURLVariable('SESSION_ID')
        });

        // Start Task
        initTask(jsPsych, subject_id);
    </script>
</body>

</html>
