<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodic Recognition Task</title>

    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.5.0"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #fafafa 0%, #ececec 58%, #dfdfdf 100%);
            color: #333333;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .jspsych-content-wrapper {
            max-width: 1300px;
        }

        /* ── Instruction panels ── */
        .instruction-container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 36px 36px 28px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.08);
            text-align: left;
            line-height: 1.65;
            position: relative;
        }

        .instruction-container h2 {
            margin: 0 0 16px;
            font-weight: 800;
            color: #171717;
        }

        /* ── Keyboard nav hint ── */
        .nav-hint {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 14px;
            border-top: 1px solid #e4e4e4;
            font-size: 0.88rem;
            color: #888;
        }

        /* ── Demo cards in instructions ── */
        .ins-card {
            position: relative;
            display: inline-block;
            width: 240px;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .ins-card-sm {
            width: 210px;
            height: 210px;
        }

        .ins-card-bg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .ins-card-obj {
            position: absolute;
            top: 12%;
            left: 12%;
            width: 76%;
            height: 76%;
            object-fit: contain;
        }

        .ins-card-highlighted {
            outline: 4px solid #22c55e;
            box-shadow: 0 0 14px #22c55e99, 0 6px 16px rgba(0,0,0,0.12);
        }

        .ins-trial-demo {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 18px 0;
        }

        .ins-card-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .ins-key-row {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin: 4px 0 10px;
            font-size: 0.95rem;
        }

        .ins-feedback-demo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 18px 0;
        }

        .ins-card-row-small {
            display: flex;
            gap: 16px;
        }

        .ins-arrow {
            font-size: 2rem;
            font-weight: 800;
            color: #5b6168;
        }

        /* ── Screen rectangle (wraps card pairs in instructions) ── */
        .ins-screen {
            display: inline-flex;
            gap: 18px;
            align-items: center;
            justify-content: center;
            background: #d8d8d8;
            border-radius: 14px;
            padding: 16px 22px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.10);
        }

        /* ── Feedback image strip (page 5) ── */
        .ins-feedback-list {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 14px 0;
        }

        .ins-feedback-img {
            width: 160px;
            height: 160px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }

        /* ── Quiz ── */
        .quiz-num {
            font-size: 0.9rem;
            font-weight: 700;
            color: #888;
            margin: 0 0 8px;
        }

        .quiz-options {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 20px 0 8px;
        }

        .quiz-option {
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* ── Buttons ── */
        .jspsych-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            background: #171717;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
            cursor: pointer;
        }

        .jspsych-btn:hover {
            transform: translateY(-1px);
        }

        /* ── Canvas ── */
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <script src="params.js"></script>
    <script src="../../stimuli/stimuli_metadata.js"></script>
    <script src="sequence_utils.js"></script>
    <script src="task.js"></script>
    <script>
        const jsPsych = initJsPsych({
            on_finish: function () {
                // Final redirect handled in task timeline.
            }
        });

        document.body.style.backgroundColor = params.background_color;

        const subject_id = jsPsych.randomization.randomID(10);
        jsPsych.data.addProperties({
            subject_id: subject_id,
            prolific_id: jsPsych.data.getURLVariable('PROLIFIC_PID') || 'local',
            study_id: jsPsych.data.getURLVariable('STUDY_ID') || 'local',
            session_id: jsPsych.data.getURLVariable('SESSION_ID') || 'local'
        });

        initTask(jsPsych, subject_id);
    </script>
</body>

</html>
